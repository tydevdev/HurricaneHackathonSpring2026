<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A cutesy '90s arcade with tiny playable Space Invaders, Pac-Munch, and Snake cabinets."
    />
    <title>Pixel Pop Arcade</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script type="module" crossorigin src="./assets/index-CHYavcRw.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BY_IOTLj.css">
  </head>
  <body>
    <main id="app">
      <section class="arcade-shell" aria-labelledby="arcade-title">
        <div class="marquee" aria-hidden="true">
          <span>play</span>
          <span>pixel pop</span>
          <span>insert sparkle</span>
          <span>play</span>
          <span>pixel pop</span>
          <span>insert sparkle</span>
        </div>

        <header class="hero">
          <div>
            <p class="date-stamp">1997-ish</p>
            <h1 id="arcade-title">Pixel Pop Arcade</h1>
            <p class="intro">Three pocket-sized cabinet games, tuned for keyboard, mouse, and thumbs.</p>
          </div>
          <a class="back-link" href="../">Back to hub</a>
        </header>

        <section class="floor">
          <nav class="machine-wall" aria-label="Choose an arcade cabinet" id="machine-grid">
            <button class="machine is-active" type="button" data-game="invaders">
              <span class="cabinet-screen cabinet-invaders" aria-hidden="true">
                <i></i><i></i><i></i>
              </span>
              <span class="machine-name">Space Invaders</span>
              <span class="machine-note">Star shots, jelly ships</span>
            </button>
            <button class="machine" type="button" data-game="maze">
              <span class="cabinet-screen cabinet-maze" aria-hidden="true">
                <i></i><i></i><i></i>
              </span>
              <span class="machine-name">Pac-Munch</span>
              <span class="machine-note">Snack maze, shy ghosts</span>
            </button>
            <button class="machine" type="button" data-game="snake">
              <span class="cabinet-screen cabinet-snake" aria-hidden="true">
                <i></i><i></i><i></i>
              </span>
              <span class="machine-name">Snake</span>
              <span class="machine-note">Ribbon trails, berry bites</span>
            </button>
          </nav>

          <section class="cabinet-stage" aria-label="Selected game cabinet">
            <div class="cabinet-top">
              <div>
                <p class="cabinet-label">Now playing</p>
                <h2 id="current-title">Space Invaders</h2>
              </div>
              <button class="restart-button" type="button" id="restart-button">Restart</button>
            </div>

            <div class="screen-frame">
              <div id="game-canvas" class="game-canvas" aria-label="Arcade game screen"></div>
              <div class="crt-glass" aria-hidden="true"></div>
            </div>

            <div class="scoreboard" aria-live="polite">
              <span id="score-readout">Score 0</span>
              <span id="lives-readout">Lives 3</span>
              <span id="status-readout">Ready</span>
            </div>

            <div class="controls" aria-label="Game controls">
              <button type="button" data-action="up">Up</button>
              <div class="control-row">
                <button type="button" data-action="left">Left</button>
                <button type="button" data-action="primary">Zap</button>
                <button type="button" data-action="right">Right</button>
              </div>
              <button type="button" data-action="down">Down</button>
            </div>
          </section>
        </section>
      </section>
    </main>

  </body>
</html>
